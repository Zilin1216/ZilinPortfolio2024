<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Website</title>
    <!-- 引入 Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- 引入自訂 CSS -->
    <link rel="stylesheet" href="css/style.css">
    <!-- 引入 AOS 的 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">

    
</head>
<body>

    <!-- 頁首 -->
    <header>
        <div class="container">
            <div class="d-flex justify-content-between align-items-center">
                <h1>ZILIN's Portfolio</h1>
                <nav>
                    <a href="#about">About.</a>
                    <a href="/Portfolio/illustration.html" target="_blank">Illustration.</a>
                    <a href="/Portfolio/media.html" target="_blank">Media.</a>
                    <a href="/Portfolio/3Dworks.html" target="_blank">3Dwork.</a>
                </nav>
            </div>
        </div>
    </header>

    <!-- Carousel -->
    <div id="demo" class="carousel slide shadow" data-bs-ride="carousel" data-aos="fade-down">

    <!-- Indicators/dots -->
    <div class="carousel-indicators">
      <button type="button" data-bs-target="#demo" data-bs-slide-to="0" class="active"></button>
      <button type="button" data-bs-target="#demo" data-bs-slide-to="1"></button>
      <button type="button" data-bs-target="#demo" data-bs-slide-to="2"></button>
    </div>
    
    <!-- The slideshow/carousel -->
    <div class="carousel-inner">
      <div class="carousel-item active">
        <img src="img/banner01.png" alt="Los Angeles" class="d-block" style="width:100%">
      </div>
      <div class="carousel-item">
        <img src="img/banner02.JPG" alt="Chicago" class="d-block" style="width:100%">
      </div>
      <div class="carousel-item">
        <img src="img/banner03.JPG" alt="New York" class="d-block" style="width:100%">
      </div>
    </div>
    
    <!-- Left and right controls/icons -->
    <button class="carousel-control-prev" type="button" data-bs-target="#demo" data-bs-slide="prev">
      <span class="carousel-control-prev-icon"></span>
    </button>
    <button class="carousel-control-next" type="button" data-bs-target="#demo" data-bs-slide="next">
      <span class="carousel-control-next-icon"></span>
    </button>
    </div>
  
    <!-- 介紹區塊 --> 
    <section id="about" class="parallax" style="background-image: url('img/000033150031.png');">
        <div class="container text-center shadow mt-5 p-5 rounded bg-light-transparent">
            <div class="row align-items-center" data-aos="fade-right">
                <!-- 文字區域 -->
                <div class="col-md-6 text-md-start text-center">
                    <h2>About.</h2>
                    <p>
                        Hello, this is ZI LIN.<br>
                        I'm currently studying at NUTC and majoring in Multimedia Design.<br>
                        This website is used for recording my works.
                    </p>
                </div>
                <!-- 圖片區域 -->
                <div class="col-md-6 text-center">
                    <img src="img/me.png" alt="Profile Picture" class="shadow img-fluid">
                </div>
            </div>
        </div>
    </section>

    <!-- 聯絡表單 -->
    <section id="contact" class="parallax" style="background-image: url('img/000033150031.png');">
        <div class="container text-center shadow mt-5 p-5 rounded bg-light-transparent">
            <div class="row justify-content-center" data-aos="fade-right">
                <div class="col-md-8">
                    <h2 class="text-center mb-4">Contact Me</h2>
                            <form action="mailto:e97716@gmail.com" method="POST" enctype="text/plain">
                                <div class="mb-3">
                                    <label for="name" class="form-label">Name</label>
                                    <input type="text" id="name" class="form-control" placeholder="Enter your name" required>
                                </div>
                                <div class="mb-3">
                                    <label for="email" class="form-label">Email Address</label>
                                    <input type="email" id="email" class="form-control" placeholder="Enter your email" required>
                                </div>
                                <div class="mb-3">
                                    <label for="message" class="form-label">Message</label>
                                    <textarea id="message" class="form-control" rows="5" placeholder="Enter your message" required></textarea>
                                </div>
                                <div class="d-grid">
                                    <button class="custom-button">Click Me</button>
                                </div>
                            </form>
                        </div>
                </div>
            </div>
        </div>
    </section>

    <!-- 頁尾 -->
    <footer>
        <p class="mb-0">© 2024 ZILIN's Portfolio.</p>
    </footer>
</body>

<script type="module">
    import { Toast } from 'bootstrap.esm.min.js'
  
    Array.from(document.querySelectorAll('.toast'))
      .forEach(toastNode => new Toast(toastNode))
  </script>
  <!-- 引入 AOS 的 JavaScript -->
<script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
<script>
    AOS.init({
        duration: 1200, // 動畫持續時間（毫秒）
        once: true,     // 滾動動畫只執行一次
    });
</script>
</html>
